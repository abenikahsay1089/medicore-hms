spring:
  datasource:
    url: ${DATABASE_URL:jdbc:tc:postgresql:16-alpine:///medicore}
    username: ${POSTGRES_USER:medicore}
    password: ${POSTGRES_PASSWORD:medicore_secret}
    driver-class-name: ${DB_DRIVER:org.testcontainers.jdbc.ContainerDatabaseDriver}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true

  mail:
    host: localhost
    port: 1025

medicore:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long
    access-expiration: 900000
    refresh-expiration: 604800000
  frontend-url: http://localhost:5173
