services:
  postgres:
    image: postgres:16-alpine
    container_name: medicore-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medicore}
      POSTGRES_USER: ${POSTGRES_USER:-medicore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medicore_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medicore} -d ${POSTGRES_DB:-medicore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medicore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medicore-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-medicore}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-medicore_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicore-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-medicore}
      POSTGRES_USER: ${POSTGRES_USER:-medicore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medicore_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-medicore}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-medicore_secret}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_BACKEND_URL:-http://localhost:8080}
    container_name: medicore-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  redis_data:
